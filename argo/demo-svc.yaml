apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-svc
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: demo-svc
  template:
    metadata:
      labels:
        app: demo-svc
    spec:
      containers:
        - image: ghcr.io/spyrosmoux/demo-svc:latest
          name: demo-svc
          ports:
            - containerPort: 80
